<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Text Intelligence | AI Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-color: #0b0f19;
      --text-color: #e2e8f0;
      --primary-gradient: linear-gradient(135deg, #3b82f6, #8b5cf6);
      --glass-bg: rgba(30, 41, 59, 0.4);
      --glass-border: rgba(255, 255, 255, 0.08);
      --input-bg: rgba(0, 0, 0, 0.2);
      --accent: #8b5cf6;
    }

    [data-theme="light"] {
      --bg-color: #f8fafc;
      --text-color: #1e293b;
      --glass-bg: rgba(255, 255, 255, 0.8);
      --glass-border: rgba(0, 0, 0, 0.1);
      --input-bg: #ffffff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      height: 100vh;
      display: flex;
      flex-direction: column;
      transition: background-color 0.3s;
    }

    header {
      padding: 1rem 2rem;
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
    }

    .brand {
      font-weight: 700;
      font-size: 1.2rem;
      color: var(--accent);
    }

    .nav-link {
      text-decoration: none;
      color: var(--text-color);
      opacity: 0.85;
      font-weight: 600;
    }

    .nav-link:hover {
      opacity: 1;
      text-decoration: underline;
    }

    .main-container {
      flex: 1;
      display: flex;
      gap: 1.5rem;
      padding: 1.5rem;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      height: calc(100vh - 80px);
    }

    .input-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    textarea {
      flex: 1;
      background: var(--input-bg);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 1.5rem;
      color: var(--text-color);
      font-family: 'Cairo', sans-serif;
      font-size: 1rem;
      resize: none;
      outline: none;
      transition: 0.3s;
    }

    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2);
    }

    .action-btn {
      background: var(--primary-gradient);
      border: none;
      padding: 1rem;
      border-radius: 12px;
      color: white;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Cairo', sans-serif;
      transition: transform 0.2s;
    }

    .action-btn:hover {
      transform: translateY(-2px);
    }

    .chat-section {
      flex: 1;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      padding: 1rem;
      border-bottom: 1px solid var(--glass-border);
      font-weight: 600;
      background: rgba(0, 0, 0, 0.1);
    }

    .chat-messages {
      flex: 1;
      padding: 1rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .msg {
      max-width: 85%;
      padding: 0.8rem 1.2rem;
      border-radius: 12px;
      font-size: 0.95rem;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user {
      align-self: flex-start;
      background: var(--accent);
      color: white;
      border-bottom-right-radius: 2px;
    }

    .msg.ai {
      align-self: flex-end;
      background: var(--input-bg);
      border: 1px solid var(--glass-border);
      border-bottom-left-radius: 2px;
    }

    .msg.error {
      border: 1px solid rgba(255, 0, 0, 0.25);
      background: rgba(255, 0, 0, 0.08);
    }

    .controls {
      padding: 1rem;
      border-top: 1px solid var(--glass-border);
      display: flex;
      gap: 0.5rem;
    }

    .control-btn {
      flex: 1;
      padding: 0.65rem;
      border-radius: 10px;
      border: 1px solid var(--glass-border);
      background: transparent;
      color: var(--text-color);
      cursor: pointer;
      font-family: 'Cairo', sans-serif;
      font-weight: 700;
      transition: 0.2s;
    }

    .control-btn:hover {
      background: rgba(255, 255, 255, 0.06);
    }

    @media (max-width: 768px) {
      .main-container {
        flex-direction: column;
        height: auto;
      }

      .input-section,
      .chat-section {
        height: 420px;
      }
    }
  </style>
</head>

<body>

  <header>
    <a href="{{ url_for('home') }}" class="nav-link">العودة إلى الرئيسية</a>
    <div class="brand">AI Text Intelligence Assistant</div>
    <div style="width: 80px;"></div>
  </header>

  <div class="main-container">
    <!-- Input Side -->
    <div class="input-section">
      <textarea id="sourceText" placeholder="أدخل النص الأكاديمي هنا للتحليل، التلخيص، أو التبسيط..."></textarea>
      <button class="action-btn" id="analyzeBtn">تحليل النص 🚀</button>
    </div>

    <!-- Chat/Output Side -->
    <div class="chat-section">
      <div class="chat-header">نتائج الذكاء</div>

      <div class="chat-messages" id="chatOutput">
        <div class="msg ai">أنا جاهز للمساعدة. ألصق النص ثم اختر (تحليل / تلخيص / تبسيط).</div>
      </div>

      <div class="controls">
        <button class="control-btn" id="summarizeBtn">تلخيص</button>
        <button class="control-btn" id="simplifyBtn">تبسيط</button>
        <button class="control-btn" id="clearBtn">مسح</button>
      </div>
    </div>
  </div>

  <footer style="text-align:center; padding:1rem; opacity:0.6; font-size:0.85rem; border-top:1px solid var(--glass-border);">
    Eng: Badraldeen Mortatha Mohialdeen | AI Systems Developer
  </footer>

  <script>
    const sourceText = document.getElementById('sourceText');
    const chatOutput = document.getElementById('chatOutput');

    const analyzeBtn = document.getElementById('analyzeBtn');
    const summarizeBtn = document.getElementById('summarizeBtn');
    const simplifyBtn = document.getElementById('simplifyBtn');
    const clearBtn = document.getElementById('clearBtn');

    function escapeHTML(str) {
      return str.replace(/[&<>"']/g, (m) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[m]));
    }

    function addMessage(text, sender, extraClass = "") {
      const div = document.createElement('div');
      div.className = `msg ${sender} ${extraClass}`.trim();
      div.innerHTML = escapeHTML(text);
      chatOutput.appendChild(div);
      chatOutput.scrollTop = chatOutput.scrollHeight;
      return div;
    }

    function clearChat() {
      chatOutput.innerHTML = '<div class="msg ai">تم مسح المحادثة. جاهز للبدء من جديد.</div>';
    }

    function buildInstruction(mode) {
      if (mode === "summarize") {
        return "لخّص النص التالي في نقاط واضحة، ثم اعطني 5 أسئلة مراجعة مع إجابات قصيرة:";
      }
      if (mode === "simplify") {
        return "بسّط النص التالي بلغة عربية واضحة وسهلة، مع الحفاظ على المعنى العلمي، ثم اذكر المصطلحات المهمة:";
      }
      // analyze
      return "حلّل النص التالي أكاديميًا: (الفكرة الرئيسية، الأفكار الفرعية، النقاط المهمة، أي ملاحظات لغوية/مصطلحية)، ثم اقترح عنوانًا مناسبًا:";
    }

    async function processText(mode) {
      const text = sourceText.value.trim();
      if (!text) {
        addMessage("الرجاء إدخال نص أولاً للمعالجة.", "ai", "error");
        return;
      }

      // Show user text
      addMessage(text, "user");

      // Loading
      const loadingMsg = addMessage("⏳ Processing...", "ai");

      try {
        const prompt = `${buildInstruction(mode)}\n\n${text}`;

        const response = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            message: prompt,
            mode: "text"
          })
        });

        const data = await response.json();

        // remove loading
        loadingMsg.remove();

        if (!response.ok) {
          addMessage(`⚠ ${data.error || "Server error"}`, "ai", "error");
          return;
        }

        addMessage(data.reply || "لم يصل رد من الخادم.", "ai");

      } catch (err) {
        loadingMsg.remove();
        addMessage("⚠ Connection error", "ai", "error");
      }
    }

    analyzeBtn.addEventListener('click', () => processText('analyze'));
    summarizeBtn.addEventListener('click', () => processText('summarize'));
    simplifyBtn.addEventListener('click', () => processText('simplify'));
    clearBtn.addEventListener('click', clearChat);
  </script>

</body>

</html>
